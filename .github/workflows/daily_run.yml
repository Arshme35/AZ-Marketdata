name: Daily Quant Engine Run

on:
  schedule:
    # Runs automatically every day around market close
    - cron: '30 11 * * *' 
  workflow_dispatch: # This allows you to run it manually

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas

    - name: Run Quant Engine
      run: python quant_engine.py

    - name: Commit and Push Data
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "Quant Desk Bot"
        git add daily_picks.json swing_picks.json
        # The || echo prevents the workflow from failing if data hasn't changed
        git commit -m "Automated Data Update: Value & Swing" || echo "No changes to commit"
        git push
