name: Daily Quant Engine Run

on:
  schedule:
    - cron: '30 11 * * *' 
  workflow_dispatch:

# THIS IS THE MAGIC FIX: Grants the bot permission to save the files
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas requests

    - name: Run Quant Engine
      run: python quant_engine.py

    - name: Commit and Push Data
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "Quant Desk Bot"
        git add *.json
        git commit -m "Automated Data Update" || echo "No changes to commit"
        git push
