name: Daily Quant Engine Run

on:
  schedule:
    # Runs at 11:00 AM UTC (which is 4:30 PM IST) Monday to Friday
    - cron: '0 11 * * 1-5'
  workflow_dispatch: # This allows you to run it manually right now!

permissions:
  contents: write # Allows the bot to save the JSON file back to your repo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Quant Engine
        run: python quant_engine.py
        
      - name: Commit and Push JSON
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add daily_picks.json
          git commit -m "Automated Market Close Run" || echo "No changes to commit"
          git push
